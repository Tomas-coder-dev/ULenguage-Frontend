name: ulenguage_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.5.0
  provider: ^6.1.5+1
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.2
  sign_in_with_apple: ^7.0.1
  connectivity_plus: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/google_icon.png
    - assets/facebook_icon.png
    - assets/apple_icon.png
    - assets/inka.png
    - assets/ocr_imaynallam.png
    - assets/ocr_salesmanager.jpeg
    - assets/Machu_Picchu.jpg
    - assets/centro_historico.jpg
    - assets/Ollantaytambo.jpg
    - assets/map_cusco.png

  fonts:
    - family: SFProDisplay
      fonts:
        - asset: fonts/SFPRODISPLAYREGULAR.OTF